<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>Moje Filmy</title>

    <meta name="theme-color" content="#141414">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TŁO -->
<div class="background-overlay"></div>

<!-- HEADER -->

<header class="header">

    <div class="logo">
        MOJE FILMY
    </div>

    <nav>

        <button class="category-btn active" data-category="csi">
            CSI
        </button>

        <button class="category-btn" data-category="serial1670_s1">
            1670 S1
        </button>

        <button class="category-btn" data-category="serial1670_s2">
            1670 S2
        </button>

        <button class="category-btn" data-category="filmy">
            Filmy
        </button>

    </nav>

</header>

<!-- HERO -->

<section class="hero">

    <div class="hero-content">

        <h1>
            Oglądaj gdzie chcesz.
        </h1>

        <p>
            Twoja prywatna biblioteka filmów i seriali.
        </p>

    </div>

</section>

<!-- KONTYNUUJ -->

<section class="continue-section">

    <h2>
        Kontynuuj oglądanie
    </h2>

    <div id="continue-grid">

        <div class="continue-placeholder">

            Nie oglądałeś jeszcze żadnego filmu.

        </div>

    </div>

</section>

<!-- ODTWARZACZ -->

<section
class="player-section"
id="player-section">

<div class="player-top">

<button
id="back-btn"
class="back-btn">

← Powrót

</button>

<h2 id="video-title">

Wybierz odcinek

</h2>

</div>

<div id="player-wrapper">

<img
id="placeholder-img"
src="https://placehold.co/1280x720/111111/ffffff?text=Wybierz+film"
alt="placeholder">

</div>

</section>

<!-- LISTA -->

<section class="movies">

<h2>

Dostępne odcinki

</h2>

<div
id="movies-grid"
class="movies-grid">

</div>

</section>

<!-- STOPKA -->

<footer>

<p>

© 2025 Moje Filmy

</p>

</footer>

<script src="script.js"></script>

</body>
</html>
