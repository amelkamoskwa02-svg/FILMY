<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Moje Filmy i Seriale</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Moje Filmy i Seriale</h1>
  </header>

  <main class="container">
    <!-- Odtwarzacz -->
    <section class="player-section">
      <div class="player-header">
        <h2 id="video-title">Wybierz film lub odcinek</h2>
        <div class="player-controls">
          <div id="timestamp-controls" style="display: none; align-items: center; gap: 6px;">
            <input type="text" id="time-input" placeholder="np. 12:30">
            <button id="save-time-btn" class="player-btn" title="Zapisz minutę">💾 Zapisz</button>
          </div>
          <button id="fullscreen-btn" class="player-btn open-btn" style="display: none;" title="Pełny ekran">⛶ Pełny ekran</button>
          <button id="next-btn" class="player-btn" style="display: none;" title="Następny odcinek">⏭</button>
          <button id="close-btn" class="player-btn close-btn" style="display: none;" title="Zamknij odtwarzacz">✕</button>
        </div>
      </div>
      <div id="player-wrapper">
        <img src="https://placehold.co/800x450/111111/FFFFFF?text=Wybierz+odcinek+z+listy+ponizej" alt="Podgląd" id="placeholder-img">
      </div>
    </section>

    <!-- Kategorie -->
    <section class="categories-section">
      <div class="categories">
        <button class="category-btn" data-category="filmy">Filmy</button>
        <button class="category-btn active" data-category="csi">CSI</button>
        <button class="category-btn" data-category="serial1670_s1">1670 (Sezon 1)</button>
        <button class="category-btn" data-category="serial1670_s2">1670 (Sezon 2)</button>
      </div>
    </section>

    <!-- Lista filmów/odcinków -->
    <section class="movies-section">
      <div id="movies-grid" class="movies-grid"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
