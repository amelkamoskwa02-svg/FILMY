<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kino ze Znajomymi</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🎬 Nasze Domowe Kino</h1>
  </header>

  <main>
    <!-- Główny Odtwarzacz -->
    <section class="player-container">
      <h2 id="video-title">Wybierz film z listy poniżej</h2>
      <video id="main-player" controls poster="https://via.placeholder.com/800x450?text=Wybierz+film">
        <source id="video-source" src="" type="video/mp4">
        Twoja przeglądarka nie obsługuje odtwarzacza wideo.
      </video>
    </section>

    <!-- Lista Filmów -->
    <section class="movies-grid" id="movies-list">
      <!-- Karty filmów wygeneruje JavaScript -->
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
