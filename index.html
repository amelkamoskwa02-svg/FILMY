<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moje Filmy i Seriale</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Nawigacja / Zakładki -->
  <nav class="navbar">
    <div class="logo">FILMY</div>
    <div class="categories">
      <button class="category-btn" data-category="filmy">Filmy</button>
      <button class="category-btn active" data-category="csi">CSI</button>
    </div>
  </nav>

  <!-- Odtwarzacz Wideo -->
  <main class="container">
    <section class="player-section">
      <h2 id="video-title">Wybierz odcinek z listy poniżej</h2>
      <div id="player-wrapper">
        <div id="video-container">
          <img src="https://placehold.co/800x450/111111/e50914?text=Wybierz+film" alt="Odtwarzacz" style="width: 100%; border-radius: 12px;">
        </div>
      </div>
    </section>

    <!-- Siatka z kafelkami -->
    <section class="movies-section">
      <h2>Lista Odcinków</h2>
      <div id="movies-grid" class="movies-grid"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
