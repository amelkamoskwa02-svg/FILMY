<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kino ze Znajomymi</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>🎬 Nasze Domowe Kino</h1>
    <!-- Menu z zakładkami -->
  <!-- Menu z zakładkami -->
    <nav class="categories">
      <button class="nav-btn" data-category="filmy">Filmy</button>
      <button class="nav-btn active" data-category="csi">CSI</button>
    </nav>
  </header>

  <main>
    <!-- Główny Odtwarzacz -->
    <section class="player-container">
      <h2 id="video-title">Wybierz film lub odcinek z listy poniżej</h2>
      <div id="player-wrapper">
        <video id="main-player" controls poster="https://via.placeholder.com/800x450?text=Wybierz+film">
          <source id="video-source" src="" type="video/mp4">
          Twoja przeglądarka nie obsługuje odtwarzacza wideo.
        </video>
      </div>
    </section>

    <!-- Lista Filmów / Odcinków -->
    <section class="movies-grid" id="movies-list">
      <!-- Generowane przez JavaScript -->
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
